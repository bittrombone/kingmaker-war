<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Army Stat Card</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/dist/browser/index.umd.js"></script>
  <style>
    body { padding: 0; }
    .card-wrap { padding: 10px; }
    .section-label { font-size: 10px; color: #666; letter-spacing: 0.05em; margin: 8px 0 4px; }
    .stat-edit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-bottom: 8px; }
    .stat-edit { display: flex; flex-direction: column; }
    .stat-edit label { font-size: 9px; color: #666; margin-bottom: 2px; }
    .stat-edit input { padding: 3px 4px; background: #111; border: 1px solid #333; border-radius: 3px; color: #D3D1C7; font-size: 12px; width: 100%; }
    .name-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .name-row input { flex: 1; padding: 5px 8px; background: #111; border: 1px solid #333; border-radius: 4px; color: #D3D1C7; font-size: 14px; font-weight: 500; }
    .side-toggle { display: flex; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
    .side-btn { flex: 1; padding: 5px 8px; background: #1a1a18; color: #666; border: none; cursor: pointer; font-size: 11px; transition: all 0.15s; }
    .side-btn.active-friendly { background: #0d1e30; color: #378ADD; }
    .side-btn.active-enemy { background: #2a0d0d; color: #E24B4A; }
    .hp-edit-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .save-btn { width: 100%; padding: 8px; background: #EF9F27; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; margin-top: 4px; }
    .save-btn:hover { background: #d4891f; }
    .divider { border: none; border-top: 0.5px solid #333; margin: 8px 0; }
    .sc-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 8px; }
    .sc-tab { flex: 1; padding: 6px; text-align: center; cursor: pointer; font-size: 11px; color: #666; border-bottom: 2px solid transparent; }
    .sc-tab.active { color: #EF9F27; border-bottom-color: #EF9F27; }
    .gear-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 6px; background: #1a1a18; border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
    .gear-name { color: #D3D1C7; flex: 1; }
    .gear-bonus { font-size: 11px; color: #5DCAA5; margin-left: 6px; }
    .gear-remove { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 2px; }
    .gear-remove:hover { color: #E24B4A; }
    .gear-add-row { display: flex; gap: 4px; margin-top: 6px; }
    .gear-select { flex: 1; padding: 4px 6px; background: #111; border: 1px solid #333; border-radius: 3px; color: #D3D1C7; font-size: 11px; }
  </style>
</head>
<body>
<div class="card-wrap" id="card">
  <div style="font-size:11px;color:#666;text-align:center;padding:20px">Loading...</div>
</div>
<script>
(function() {
const OBR = window.OBR;
const ID = "com.kingmaker.war";

const params = new URLSearchParams(window.location.search);
const armyId = params.get('armyId');
const itemId  = params.get('itemId');

let army = null;
let armies = [];

const CONDITIONS = [
  { key:'shaken',     label:'Shaken',     hasValue:true,  max:4 },
  { key:'weary',      label:'Weary',      hasValue:true,  max:4 },
  { key:'mired',      label:'Mired',      hasValue:true,  max:4 },
  { key:'outflanked', label:'Outflanked', hasValue:false },
  { key:'fortified',  label:'Fortified',  hasValue:false },
  { key:'routed',     label:'Routed',     hasValue:false },
  { key:'pinned',     label:'Pinned',     hasValue:false },
  { key:'distant',    label:'Distant',    hasValue:false },
  { key:'concealed',  label:'Concealed',  hasValue:false },
  { key:'engaged',    label:'Engaged',    hasValue:false },
];

// Try loading from URL param first for instant render
const dataParam = params.get('data');
if (dataParam) {
  try {
    army = JSON.parse(decodeURIComponent(dataParam));
    render(); // render immediately without waiting for OBR
  } catch(e) {}
}

let scTab = 'stats'; // 'stats' or 'gear'

const GEAR_OPTIONS = [
  { id:'magic_weapon_1',   label:'Magic Weapons',         bonus:'+1 ATK/RNG',  atk:1,  rng:1,  ac:0,  man:0,  mor:0 },
  { id:'magic_weapon_2',   label:'Greater Magic Weapons',  bonus:'+2 ATK/RNG',  atk:2,  rng:2,  ac:0,  man:0,  mor:0 },
  { id:'magic_weapon_3',   label:'Major Magic Weapons',    bonus:'+3 ATK/RNG',  atk:3,  rng:3,  ac:0,  man:0,  mor:0 },
  { id:'magic_armor_1',    label:'Magic Armor',            bonus:'+1 AC',       atk:0,  rng:0,  ac:1,  man:0,  mor:0 },
  { id:'magic_armor_2',    label:'Greater Magic Armor',    bonus:'+2 AC',       atk:0,  rng:0,  ac:2,  man:0,  mor:0 },
  { id:'magic_armor_3',    label:'Major Magic Armor',      bonus:'+3 AC',       atk:0,  rng:0,  ac:3,  man:0,  mor:0 },
  { id:'additional_weapon',label:'Additional Weapon',      bonus:'Melee+Ranged', atk:0, rng:0,  ac:0,  man:0,  mor:0, special:'additional_weapon' },
  { id:'healing_potions',  label:'Healing Potions (3)',    bonus:'3x heal 1 HP', atk:0, rng:0,  ac:0,  man:0,  mor:0, special:'healing_potions', charges:3 },
];

function getGearBonuses(gear) {
  const bonuses = { atk:0, rng:0, ac:0, man:0, mor:0 };
  for (const g of (gear||[])) {
    const opt = GEAR_OPTIONS.find(o=>o.id===g.id);
    if (!opt) continue;
    bonuses.atk += opt.atk||0;
    bonuses.rng += opt.rng||0;
    bonuses.ac  += opt.ac||0;
    bonuses.man += opt.man||0;
    bonuses.mor += opt.mor||0;
  }
  return bonuses;
}

OBR.onReady(async () => {
  // Load fresh data from room metadata
  await loadArmy();
  render();

  OBR.room.onMetadataChange((meta) => {
    const d = meta[`${ID}/data`];
    if (d) {
      armies = d.armies || [];
      const fresh = armies.find(a => a.id === armyId);
      if (fresh) { army = fresh; render(); }
    }
  });
});

async function loadArmy() {
  try {
    const meta = await OBR.room.getMetadata();
    const d = meta[`${ID}/data`];
    if (d) {
      armies = d.armies || [];
      const fresh = armies.find(a => a.id === armyId);
      if (fresh) army = fresh; // use room data if available, keeps URL data as fallback
    }
  } catch(e) { console.warn('loadArmy', e); }
}

async function saveArmy() {
  if (!army) return;
  try {
    const meta = await OBR.room.getMetadata();
    const d = meta[`${ID}/data`] || {};
    armies = d.armies || [];
    const idx = armies.findIndex(a => a.id === armyId);
    if (idx >= 0) armies[idx] = army;
    else armies.push(army);
    await OBR.room.setMetadata({ [`${ID}/data`]: { ...d, armies } });
    // Also update token name if it changed
    try {
      await OBR.scene.items.updateItems([itemId], (items) => {
        for (const i of items) {
          i.name = army.name;
          i.metadata[`${ID}/army`] = {
            id: army.id, friendly: army.friendly,
            ac: army.ac, man: army.man, mor: army.mor, sct: army.sct,
            atk: army.atk, rng: army.rng, maxHp: army.maxHp, rt: army.rt,
            maxShots: army.maxShots, shots: army.shots, hp: army.hp,
            conditions: army.conditions,
          };
        }
      });
    } catch(e) {}
  } catch(e) { console.warn('saveArmy', e); }
}

function render() {
  const card = document.getElementById('card');
  if (!army) { card.innerHTML=`<div style="font-size:11px;color:#666;text-align:center;padding:20px">Army not found</div>`; return; }
  const c = army.conditions || {};
  const gear = army.gear || [];
  const gearBonuses = getGearBonuses(gear);
  const hpPct = army.maxHp > 0 ? (army.hp / army.maxHp) * 100 : 0;
  const hpColor = hpPct > 50 ? '#378ADD' : hpPct > 25 ? '#EF9F27' : '#E24B4A';

  let condBtns = '';
  for (const cond of CONDITIONS) {
    const active = c[cond.key] ? 'active' : '';
    const val = cond.hasValue && c[cond.key] > 0 ? `<span class="cond-value">${c[cond.key]}</span>` : '';
    condBtns += `<button class="cond-btn ${active} ${cond.key}" onclick="toggleCond('${cond.key}')">${cond.label}${val}</button>`;
  }

  // Equipped gear list
  let gearHtml = '';
  if (gear.length === 0) {
    gearHtml = `<div style="font-size:11px;color:#555;margin-bottom:6px">No gear equipped</div>`;
  } else {
    for (const g of gear) {
      const opt = GEAR_OPTIONS.find(o=>o.id===g.id);
      if (!opt) continue;
      let extraHtml = '';
      if (opt.special==='healing_potions') {
        const charges = g.charges||0;
        extraHtml = `<span style="font-size:10px;color:#888">${charges} left</span>
          <button class="rout-btn holds" style="padding:1px 6px;font-size:10px" onclick="usePotion('${g.uid}')">Use</button>`;
      }
      gearHtml += `<div class="gear-item">
        <span class="gear-name">${opt.label}</span>
        <span class="gear-bonus">${opt.bonus}</span>
        ${extraHtml}
        <button class="gear-remove" onclick="removeGear('${g.uid}')">✕</button>
      </div>`;
    }
  }

  // Bonus summary
  const bonusSummary = Object.entries(gearBonuses)
    .filter(([,v])=>v!==0)
    .map(([k,v])=>`${k.toUpperCase()} ${v>0?'+':''}${v}`)
    .join(' · ');

  // Available gear to add (exclude already equipped unique items)
  const equippedIds = gear.map(g=>g.id);
  const availableGear = GEAR_OPTIONS.filter(o => {
    // Allow multiple potions? No — one set only. Allow weapon/armor tiers — only one per category
    if (o.id.startsWith('magic_weapon') && equippedIds.some(id=>id.startsWith('magic_weapon'))) return false;
    if (o.id.startsWith('magic_armor') && equippedIds.some(id=>id.startsWith('magic_armor'))) return false;
    if (equippedIds.includes(o.id)) return false;
    return true;
  });

  card.innerHTML = `
    <div class="name-row">
      <input id="army-name" type="text" value="${army.name}" placeholder="Army name" onchange="army.name=this.value"/>
      <div class="side-toggle">
        <button class="side-btn ${army.friendly?'active-friendly':''}" onclick="setSide(true)">Allied</button>
        <button class="side-btn ${!army.friendly?'active-enemy':''}" onclick="setSide(false)">Enemy</button>
      </div>
    </div>

    <div class="hp-edit-row">
      <span style="font-size:11px;color:#666">HP</span>
      <button class="hp-btn" onclick="changeHp(-1)">−</button>
      <span style="font-size:15px;font-weight:600;min-width:24px;text-align:center">${army.hp}</span>
      <button class="hp-btn" onclick="changeHp(1)">+</button>
      <span style="font-size:11px;color:#666">/ ${army.maxHp} (RT ${army.rt})</span>
      <div style="flex:1;background:#111;border-radius:3px;height:5px;overflow:hidden;margin-left:4px">
        <div style="width:${hpPct}%;height:100%;background:${hpColor};border-radius:3px"></div>
      </div>
    </div>

    <div class="sc-tabs">
      <div class="sc-tab ${scTab==='stats'?'active':''}" onclick="switchTab('stats')">Stats</div>
      <div class="sc-tab ${scTab==='gear'?'active':''}" onclick="switchTab('gear')">Gear</div>
      <div class="sc-tab ${scTab==='conds'?'active':''}" onclick="switchTab('conds')">Conditions</div>
    </div>

    ${scTab==='stats'?`
      <div class="stat-edit-grid">
        <div class="stat-edit"><label>AC ${gearBonuses.ac?`<span style='color:#5DCAA5'>+${gearBonuses.ac}</span>`:''}</label><input type="number" value="${army.ac}" onchange="setStat('ac',this.value)"/></div>
        <div class="stat-edit"><label>MAN</label><input type="number" value="${army.man}" onchange="setStat('man',this.value)"/></div>
        <div class="stat-edit"><label>MOR</label><input type="number" value="${army.mor}" onchange="setStat('mor',this.value)"/></div>
        <div class="stat-edit"><label>SCT</label><input type="number" value="${army.sct}" onchange="setStat('sct',this.value)"/></div>
        <div class="stat-edit"><label>ATK ${gearBonuses.atk?`<span style='color:#5DCAA5'>+${gearBonuses.atk}</span>`:''}</label><input type="number" value="${army.atk}" onchange="setStat('atk',this.value)"/></div>
        <div class="stat-edit"><label>RNG ${gearBonuses.rng?`<span style='color:#5DCAA5'>+${gearBonuses.rng}</span>`:''}</label><input type="number" value="${army.rng}" onchange="setStat('rng',this.value)"/></div>
        <div class="stat-edit"><label>Max HP</label><input type="number" value="${army.maxHp}" onchange="setStat('maxHp',this.value)"/></div>
        <div class="stat-edit"><label>RT</label><input type="number" value="${army.rt}" onchange="setStat('rt',this.value)"/></div>
        <div class="stat-edit"><label>Shots</label><input type="number" value="${army.maxShots||0}" onchange="setStat('maxShots',this.value)"/></div>
      </div>
    `:''}

    ${scTab==='gear'?`
      <div style="margin-bottom:4px">
        ${gearHtml}
        ${bonusSummary?`<div style="font-size:10px;color:#5DCAA5;margin-bottom:6px">Active bonuses: ${bonusSummary}</div>`:''}
        ${availableGear.length>0?`<div class="gear-add-row">
          <select class="gear-select" id="gear-picker">
            <option value="">— add gear —</option>
            ${availableGear.map(o=>`<option value="${o.id}">${o.label} (${o.bonus})</option>`).join('')}
          </select>
          <button class="rout-btn holds" style="padding:4px 10px" onclick="addGear()">Add</button>
        </div>`:'<div style="font-size:11px;color:#555">All gear slots filled</div>'}
      </div>
    `:''}

    ${scTab==='conds'?`
      <div class="conds-grid" style="margin-bottom:8px">${condBtns}</div>
    `:''}

    <button class="save-btn" onclick="save()">Save</button>
  `;
}

window.setSide = (friendly) => { army.friendly = friendly; render(); };
window.setStat = (stat, val) => {
  army[stat] = parseInt(val) || 0;
  if (stat === 'maxHp') army.hp = Math.min(army.hp, army.maxHp);
};
window.changeHp = async (delta) => {
  army.hp = Math.max(0, Math.min(army.maxHp, army.hp + delta));
  await saveArmy(); render();
};
window.toggleCond = async (condKey) => {
  army.conditions = army.conditions || {};
  const cond = CONDITIONS.find(c => c.key === condKey);
  if (cond?.hasValue) {
    army.conditions[condKey] = ((army.conditions[condKey]||0)+1) % (cond.max+1);
    if (!army.conditions[condKey]) delete army.conditions[condKey];
  } else {
    if (army.conditions[condKey]) delete army.conditions[condKey];
    else army.conditions[condKey] = true;
  }
  if (condKey==='shaken'&&(army.conditions.shaken||0)>=4) army.conditions.routed=true;
  if (condKey==='pinned'&&army.conditions.pinned) army.conditions.outflanked=true;
  await saveArmy(); render();
};
window.switchTab = (tab) => { scTab = tab; render(); };

window.addGear = async () => {
  const sel = document.getElementById('gear-picker');
  const gearId = sel?.value; if (!gearId) return;
  const opt = GEAR_OPTIONS.find(o=>o.id===gearId); if (!opt) return;
  army.gear = army.gear || [];
  const entry = { id: gearId, uid: crypto.randomUUID() };
  if (opt.special==='healing_potions') entry.charges = 3;
  army.gear.push(entry);
  await saveArmy(); render();
};

window.removeGear = async (uid) => {
  army.gear = (army.gear||[]).filter(g=>g.uid!==uid);
  await saveArmy(); render();
};

window.usePotion = async (uid) => {
  const g = (army.gear||[]).find(x=>x.uid===uid); if (!g) return;
  if ((g.charges||0) <= 0) { alert('No charges remaining'); return; }
  g.charges--;
  army.hp = Math.min(army.maxHp, army.hp + 1);
  if (g.charges === 0) army.gear = army.gear.filter(x=>x.uid!==uid);
  await saveArmy(); render();
};

window.save = async () => {
  army.name = document.getElementById('army-name')?.value?.trim() || army.name;
  // Apply gear bonuses to effective stats (store base + gear separately)
  const bonuses = getGearBonuses(army.gear||[]);
  army.gearBonuses = bonuses;
  await saveArmy();
  OBR.notification.show(`${army.name} saved`,'INFO');
};

})();
</script>
</body>
</html>
