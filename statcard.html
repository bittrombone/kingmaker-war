<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Army Stat Card</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { padding: 0; margin: 0; }
    .card-wrap { padding: 10px; }
    .section-label { font-size: 10px; color: #666; letter-spacing: 0.05em; margin: 8px 0 4px; }
    .stat-edit-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-bottom: 8px; }
    .stat-edit { display: flex; flex-direction: column; }
    .stat-edit label { font-size: 9px; color: #666; margin-bottom: 2px; }
    .stat-edit input { padding: 3px 4px; background: #111; border: 1px solid #333; border-radius: 3px; color: #D3D1C7; font-size: 12px; width: 100%; }
    .name-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .name-row input { flex: 1; padding: 5px 8px; background: #111; border: 1px solid #333; border-radius: 4px; color: #D3D1C7; font-size: 14px; font-weight: 500; }
    .side-toggle { display: flex; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
    .side-btn { flex: 1; padding: 5px 8px; background: #1a1a18; color: #666; border: none; cursor: pointer; font-size: 11px; }
    .side-btn.active-friendly { background: #0d1e30; color: #378ADD; }
    .side-btn.active-enemy { background: #2a0d0d; color: #E24B4A; }
    .hp-edit-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .save-btn { width: 100%; padding: 8px; background: #EF9F27; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; margin-top: 4px; }
    .sc-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 8px; }
    .sc-tab { flex: 1; padding: 6px; text-align: center; cursor: pointer; font-size: 11px; color: #666; border-bottom: 2px solid transparent; }
    .sc-tab.active { color: #EF9F27; border-bottom-color: #EF9F27; }
    .gear-item { display: flex; align-items: center; gap: 4px; padding: 5px 6px; background: #1a1a18; border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
    .gear-name { color: #D3D1C7; flex: 1; }
    .gear-bonus { font-size: 11px; color: #5DCAA5; }
    .gear-remove { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 2px; }
    .gear-add-row { display: flex; gap: 4px; margin-top: 6px; }
    .gear-select { flex: 1; padding: 4px 6px; background: #111; border: 1px solid #333; border-radius: 3px; color: #D3D1C7; font-size: 11px; }
  </style>
</head>
<body>
<div class="card-wrap" id="card">
  <div style="font-size:11px;color:#666;text-align:center;padding:20px">Loading...</div>
</div>
<script>
// No OBR dependency — communicates via postMessage to parent
const params = new URLSearchParams(window.location.search);
const armyId = params.get('armyId');
const itemId  = params.get('itemId');

let army = null;
let scTab = 'stats';

const CONDITIONS = [
  { key:'shaken',     label:'Shaken',     hasValue:true,  max:4 },
  { key:'weary',      label:'Weary',      hasValue:true,  max:4 },
  { key:'mired',      label:'Mired',      hasValue:true,  max:4 },
  { key:'outflanked', label:'Outflanked', hasValue:false },
  { key:'fortified',  label:'Fortified',  hasValue:false },
  { key:'routed',     label:'Routed',     hasValue:false },
  { key:'pinned',     label:'Pinned',     hasValue:false },
  { key:'distant',    label:'Distant',    hasValue:false },
  { key:'concealed',  label:'Concealed',  hasValue:false },
  { key:'engaged',    label:'Engaged',    hasValue:false },
];

// Gear is stored as: army.gear = { armor:0, melee:0, ranged:0, potions:0, additional:false }
function getGearBonuses(gear) {
  const g = gear || {};
  return { ac: g.armor||0, atk: g.melee||0, rng: g.ranged||0 };
}

// Load from URL param immediately
try {
  const dataParam = params.get('data');
  if (dataParam) { army = JSON.parse(decodeURIComponent(dataParam)); renderCard(); }
} catch(e) {}

// Listen for updates from parent panel
window.addEventListener('message', (event) => {
  if (event.data?.type === 'ARMY_UPDATE' && event.data?.army?.id === armyId) {
    army = event.data.army;
    renderCard();
  }
});

function sendToParent(type, payload) {
  window.parent?.postMessage({ type, ...payload }, '*');
}

function renderCard() {
  const card = document.getElementById('card');
  if (!army) { card.innerHTML=`<div style="font-size:11px;color:#666;text-align:center;padding:20px">Army not found.<br>Right-click token to open.</div>`; return; }
  const c = army.conditions || {};
  const gear = army.gear || {};
  const gb = getGearBonuses(gear);
  const hpPct = army.maxHp>0?(army.hp/army.maxHp)*100:0;
  const hpColor = hpPct>50?'#378ADD':hpPct>25?'#EF9F27':'#E24B4A';

  let condBtns = '';
  for (const cond of CONDITIONS) {
    const active=c[cond.key]?'active':'';
    const val=cond.hasValue&&c[cond.key]>0?`<span class="cond-value">${c[cond.key]}</span>`:'';
    condBtns+=`<button class="cond-btn ${active} ${cond.key}" onclick="toggleCond('${cond.key}')">${cond.label}${val}</button>`;
  }

  const bonusSummary = [
    gb.ac  ? `AC +${gb.ac}`  : '',
    gb.atk ? `ATK +${gb.atk}` : '',
    gb.rng ? `RNG +${gb.rng}` : '',
  ].filter(Boolean).join(' · ');

  card.innerHTML = `
    <div class="name-row">
      <input id="army-name" type="text" value="${army.name}" placeholder="Army name" onchange="army.name=this.value"/>
      <div class="side-toggle">
        <button class="side-btn ${army.friendly?'active-friendly':''}" onclick="setSide(true)">Allied</button>
        <button class="side-btn ${!army.friendly?'active-enemy':''}" onclick="setSide(false)">Enemy</button>
      </div>
    </div>
    <div class="hp-edit-row">
      <span style="font-size:11px;color:#666">HP</span>
      <button class="hp-btn" onclick="changeHp(-1)">−</button>
      <span style="font-size:15px;font-weight:600;min-width:24px;text-align:center">${army.hp}</span>
      <button class="hp-btn" onclick="changeHp(1)">+</button>
      <span style="font-size:11px;color:#666">/ ${army.maxHp} (RT ${army.rt})</span>
      <div style="flex:1;background:#111;border-radius:3px;height:5px;overflow:hidden;margin-left:4px">
        <div style="width:${hpPct}%;height:100%;background:${hpColor};border-radius:3px"></div>
      </div>
    </div>
    <div class="sc-tabs">
      <div class="sc-tab ${scTab==='stats'?'active':''}" onclick="switchTab('stats')">Stats</div>
      <div class="sc-tab ${scTab==='gear'?'active':''}" onclick="switchTab('gear')">Gear</div>
      <div class="sc-tab ${scTab==='conds'?'active':''}" onclick="switchTab('conds')">Conditions</div>
    </div>
    ${scTab==='stats'?`
      <div class="stat-edit-grid">
        <div class="stat-edit"><label>AC${gb.ac?` <span style='color:#5DCAA5'>+${gb.ac}</span>`:''}</label><input type="number" value="${army.ac}" onchange="setStat('ac',this.value)"/></div>
        <div class="stat-edit"><label>MAN</label><input type="number" value="${army.man}" onchange="setStat('man',this.value)"/></div>
        <div class="stat-edit"><label>MOR</label><input type="number" value="${army.mor}" onchange="setStat('mor',this.value)"/></div>
        <div class="stat-edit"><label>SCT</label><input type="number" value="${army.sct}" onchange="setStat('sct',this.value)"/></div>
        <div class="stat-edit"><label>ATK${gb.atk?` <span style='color:#5DCAA5'>+${gb.atk}</span>`:''}</label><input type="number" value="${army.atk}" onchange="setStat('atk',this.value)"/></div>
        <div class="stat-edit"><label>RNG${gb.rng?` <span style='color:#5DCAA5'>+${gb.rng}</span>`:''}</label><input type="number" value="${army.rng}" onchange="setStat('rng',this.value)"/></div>
        <div class="stat-edit"><label>Max HP</label><input type="number" value="${army.maxHp}" onchange="setStat('maxHp',this.value)"/></div>
        <div class="stat-edit"><label>RT</label><input type="number" value="${army.rt}" onchange="setStat('rt',this.value)"/></div>
        <div class="stat-edit"><label>Shots</label><input type="number" value="${army.maxShots||0}" onchange="setStat('maxShots',this.value)"/></div>
      </div>
    `:''}
    ${scTab==='gear'?`
      <div style="display:flex;flex-direction:column;gap:8px">
        ${bonusSummary?`<div style="font-size:10px;color:#5DCAA5">Bonuses: ${bonusSummary}</div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:#D3D1C7">Magic Armor</label>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="hp-btn" onclick="setGear('armor',Math.max(0,(army.gear?.armor||0)-1))">−</button>
            <span style="font-size:14px;font-weight:600;min-width:20px;text-align:center;color:#5DCAA5">${gear.armor||0}</span>
            <button class="hp-btn" onclick="setGear('armor',Math.min(4,(army.gear?.armor||0)+1))">+</button>
            <span style="font-size:10px;color:#666">→ +${gear.armor||0} AC</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:#D3D1C7">Magic Melee</label>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="hp-btn" onclick="setGear('melee',Math.max(0,(army.gear?.melee||0)-1))">−</button>
            <span style="font-size:14px;font-weight:600;min-width:20px;text-align:center;color:#5DCAA5">${gear.melee||0}</span>
            <button class="hp-btn" onclick="setGear('melee',Math.min(4,(army.gear?.melee||0)+1))">+</button>
            <span style="font-size:10px;color:#666">→ +${gear.melee||0} ATK</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:#D3D1C7">Magic Ranged</label>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="hp-btn" onclick="setGear('ranged',Math.max(0,(army.gear?.ranged||0)-1))">−</button>
            <span style="font-size:14px;font-weight:600;min-width:20px;text-align:center;color:#5DCAA5">${gear.ranged||0}</span>
            <button class="hp-btn" onclick="setGear('ranged',Math.min(4,(army.gear?.ranged||0)+1))">+</button>
            <span style="font-size:10px;color:#666">→ +${gear.ranged||0} RNG</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:#D3D1C7">Healing Potions</label>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="hp-btn" onclick="setGear('potions',Math.max(0,(army.gear?.potions||0)-1))">−</button>
            <span style="font-size:14px;font-weight:600;min-width:20px;text-align:center;color:#5DCAA5">${gear.potions||0}</span>
            <button class="hp-btn" onclick="setGear('potions',Math.min(4,(army.gear?.potions||0)+1))">+</button>
            <button class="rout-btn holds" style="padding:2px 8px;font-size:11px" onclick="usePotion()">Use (heal 1)</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:#D3D1C7">Additional Weapon</label>
          <input type="checkbox" ${gear.additional?'checked':''} onchange="setGear('additional',this.checked)" style="width:18px;height:18px;cursor:pointer"/>
        </div>
      </div>
    `:''}
    ${scTab==='conds'?`<div class="conds-grid" style="margin-bottom:8px">${condBtns}</div>`:''}
    <button class="save-btn" onclick="doSave()">Save</button>
  `;
}

window.setSide = (f) => { army.friendly=f; renderCard(); };
window.setStat = (s,v) => { army[s]=parseInt(v)||0; if(s==='maxHp') army.hp=Math.min(army.hp,army.maxHp); };
window.switchTab = (t) => { scTab=t; renderCard(); };
window.changeHp = (d) => { army.hp=Math.max(0,Math.min(army.maxHp,army.hp+d)); renderCard(); };
window.toggleCond = (k) => {
  army.conditions=army.conditions||{};
  const cond=CONDITIONS.find(c=>c.key===k);
  if (cond?.hasValue) { army.conditions[k]=((army.conditions[k]||0)+1)%(cond.max+1); if(!army.conditions[k]) delete army.conditions[k]; }
  else { if(army.conditions[k]) delete army.conditions[k]; else army.conditions[k]=true; }
  if (k==='shaken'&&(army.conditions.shaken||0)>=4) army.conditions.routed=true;
  if (k==='pinned'&&army.conditions.pinned) army.conditions.outflanked=true;
  renderCard();
};
window.setGear = (key, val) => {
  army.gear = army.gear || {};
  army.gear[key] = val;
  renderCard();
};
window.usePotion = () => {
  if (!(army.gear?.potions > 0)) return;
  army.gear.potions--;
  army.hp = Math.min(army.maxHp, army.hp + 1);
  renderCard();
};
window.doSave = () => {
  army.name=document.getElementById('army-name')?.value?.trim()||army.name;
  sendToParent('SAVE_ARMY', { army, itemId });
};
</script>
</body>
</html>
