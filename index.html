<body>

<!-- No custom dice overlay — we use Dice+ extension -->

<div class="app" id="app">

<!-- KEY FIX: load SDK as a proper module script, not a dynamic import -->
<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

// ── Dice+ integration via OBR Broadcast API ────────────────────────
// Official API: https://extensions.owlbear.rodeo/dice-plus
// Send roll requests on "dice-plus/roll-request"
// Receive results on "{source}/roll-result"

const DICE_PLUS_SOURCE = "com.kingmaker.war";
let _pendingRolls = {};
let _myPlayerId = null;
let _myPlayerName = null;

// Persistent listeners — set up once in onReady, never torn down
function initDicePlusListeners() {
  // Result channel — Dice+ sends result back here after rolling
  OBR.broadcast.onMessage(`${DICE_PLUS_SOURCE}/roll-result`, (event) => {
    const data = event.data;
    const resolve = _pendingRolls[data.rollId];
    if (resolve) {
      delete _pendingRolls[data.rollId];
      // totalValue is the sum; for a single die it equals the face value
      const val = data.result?.totalValue ?? data.result?.value ?? data.value;
      resolve(val !== undefined ? (val === 0 ? 10 : val) : (Math.floor(Math.random()*20)+1));
    }
  });
  // Error channel
  OBR.broadcast.onMessage(`${DICE_PLUS_SOURCE}/roll-error`, (event) => {
    const data = event.data;
    const resolve = _pendingRolls[data.rollId];
    if (resolve) {
      delete _pendingRolls[data.rollId];
      resolve(Math.floor(Math.random() * 20) + 1);
    }
  });
}

function rollWithDicePlus(diceType) {
  return new Promise(async (resolve) => {
    const rollId = `kw_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    _pendingRolls[rollId] = resolve;

    // Timeout fallback — if Dice+ never responds, use Math.random
    const timeout = setTimeout(() => {
      if (_pendingRolls[rollId]) {
        delete _pendingRolls[rollId];
        console.warn("Dice+ timeout — using Math.random()");
        resolve(Math.floor(Math.random() * diceType) + 1);
      }
    }, 30000);

    try {
      await OBR.broadcast.sendMessage("dice-plus/roll-request", {
        rollId,
        playerId: _myPlayerId,
        playerName: _myPlayerName || "Unknown",
        rollTarget: "everyone",
        diceNotation: `1d${diceType}`,
        showResults: true,
        timestamp: Date.now(),
        source: DICE_PLUS_SOURCE
      }, { destination: "LOCAL" });
    } catch(e) {
      clearTimeout(timeout);
      delete _pendingRolls[rollId];
      console.warn("Dice+ unavailable:", e);
      resolve(Math.floor(Math.random() * diceType) + 1);
    }
  });
}

// ── App state ──────────────────────────────────────────────────────
const ID       = "com.kingmaker.war";
const BASE_URL = "https://bittrombone.github.io/kingmaker-war";

let isGM         = false;
let dataLoaded   = false;
let armies       = [];
let fortifications = [];
let round        = 1;
let currentTurnIdx = 0;
let routQueue    = [];
let targetingMode = null;
let activeTab    = 'battle';
let resultTimeout = null;
let terrain      = 'plain';
let defenderSide = 'friendly';

const TERRAINS = {
  plain:      { label:'Plain',      desc:'No modifiers. Cavalry +1 to strikes.' },
  hill:       { label:'Hill',       desc:'Defenders +2 AC vs ranged. Attackers −2 Maneuver advancing.' },
  forest:     { label:'Forest',     desc:'All ranged −2. Cavalry −2 Maneuver.' },
  swamp:      { label:'Swamp',      desc:'All armies Mired 1. Cavalry Mired 2.' },
  mountain:   { label:'Mountain',   desc:'All armies −4 Maneuver. Siege cannot deploy.' },
  river:      { label:'River',      desc:'Attackers Mired 1 round 1. Defenders +2 ranged round 1.' },
  lake:       { label:'Lake',       desc:'No battle possible.' },
  ruin:       { label:'Ruin',       desc:'All armies −2 Maneuver. All ranged −1.' },
  settlement: { label:'Settlement', desc:'All defending armies +1 to all checks.' },
};

function getTerrainMods(army, rollType) {
  const isDefender = army.friendly === (defenderSide === 'friendly');
  const isAttacker = !isDefender;
  const isRanged   = rollType && rollType.startsWith('ranged');
  const isManeuver = rollType === 'maneuver';
  const isMelee    = rollType && rollType.startsWith('attack');
  let bonus = 0;
  switch(terrain) {
    case 'plain':      if ((isMelee||isRanged) && army.type==='Cavalry') bonus += 1; break;
    case 'hill':       if (isAttacker && isManeuver) bonus -= 2; break;
    case 'forest':     if (isRanged) bonus -= 2; if (isManeuver && army.type==='Cavalry') bonus -= 2; break;
    case 'mountain':   if (isManeuver) bonus -= 4; break;
    case 'river':      if (isAttacker && isManeuver && round===1) bonus -= 2; if (isDefender && isRanged && round===1) bonus += 2; break;
    case 'ruin':       if (isManeuver) bonus -= 2; if (isRanged) bonus -= 1; break;
    case 'settlement': if (isDefender) bonus += 1; break;
  }
  return bonus;
}
function getTerrainAcMod(targetArmy) {
  const isDefender = targetArmy.friendly === (defenderSide === 'friendly');
  if (terrain === 'hill' && isDefender) return 2;
  return 0;
}

const FORT_TYPES = {
  castle:      { label:'Castle',      maxArmies:6 },
  keep:        { label:'Keep',        maxArmies:4 },
  stone_wall:  { label:'Stone Wall',  maxArmies:2 },
  tower:       { label:'Tower',       maxArmies:1 },
  wooden_wall: { label:'Wooden Wall', maxArmies:2 },
  trench:      { label:'Trench',      maxArmies:1 },
};

const CONDITIONS = [
  { key:'shaken',     label:'Shaken',     hasValue:true,  max:4 },
  { key:'weary',      label:'Weary',      hasValue:true,  max:4 },
  { key:'mired',      label:'Mired',      hasValue:true,  max:4 },
  { key:'outflanked', label:'Outflanked', hasValue:false },
  { key:'fortified',  label:'Fortified',  hasValue:false },
  { key:'routed',     label:'Routed',     hasValue:false },
  { key:'pinned',     label:'Pinned',     hasValue:false },
  { key:'distant',    label:'Distant',    hasValue:false },
  { key:'concealed',  label:'Concealed',  hasValue:false },
  { key:'engaged',    label:'Engaged',    hasValue:false },
];

function getGearBonuses(gear) {
  const g = gear || {};
  return { ac: g.armor||0, atk: g.melee||0, rng: g.ranged||0 };
}
function getModifiedStats(army) {
  const c = army.conditions || {};
  const shaken=c.shaken||0, weary=c.weary||0, mired=c.mired||0;
  const outflanked=c.outflanked?2:0, fortified=c.fortified?4:0;
  const gb = getGearBonuses(army.gear);
  return {
    ac:army.ac-weary-outflanked+fortified+gb.ac,
    man:army.man-weary-mired,
    mor:army.mor-shaken+fortified,
    atk:army.atk+gb.atk, rng:army.rng+gb.rng, sct:army.sct,
    manDC:10+army.man-weary-mired,
    morDC:10+army.mor-shaken,
  };
}

// ── Data ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const meta = await OBR.room.getMetadata();
    const d = meta[`${ID}/data`];
    if (d) {
      armies=d.armies||[]; fortifications=d.fortifications||[];
      round=d.round||1; currentTurnIdx=d.currentTurnIdx||0;
      routQueue=d.routQueue||[]; targetingMode=d.targetingMode||null;
      terrain=d.terrain||'plain'; defenderSide=d.defenderSide||'friendly';
    }
  } catch(e) { console.warn('loadData',e); }
}
async function saveData() {
  if (!dataLoaded) return;
  try {
    await OBR.room.setMetadata({[`${ID}/data`]:{armies,fortifications,round,currentTurnIdx,routQueue,targetingMode,terrain,defenderSide}});
    updateNameTags();
  } catch(e) { console.warn('saveData',e); }
}

// ── Name tags ──────────────────────────────────────────────────────
const NAME_TAG_KEY = `${ID}/nametag`;
const HP_TAG_KEY   = `${ID}/hptag`;
const COND_TAG_KEY = `${ID}/condtag`;

// Conditions that have icons on GitHub
const COND_ICONS = {
  shaken:     'Shaken',
  weary:      'Weary',
  mired:      'Mired',
  outflanked: 'Outflanked',
  fortified:  'Fortified',
  routed:     'Routed',
  pinned:     'Pinned',
  distant:    'Distant',
  concealed:  'Concealed',
  engaged:    'Engaged',
};

async function updateNameTags() {
  if (!dataLoaded) return;
  try {
    const isReady = await OBR.scene.isReady();
    if (!isReady) return;
    const sorted = [...armies].sort((a,b)=>(b.initiative||0)-(a.initiative||0));
    const activeTurn = sorted[currentTurnIdx];
    const items = await OBR.scene.items.getItems();
    const { buildText, buildImage } = await import("https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm");
    const grid = await OBR.scene.grid.getDpi();

    // Step 1: delete ALL existing kw tags in one batch
    const allOldTags = items.filter(i =>
      i.metadata?.[NAME_TAG_KEY] !== undefined ||
      i.metadata?.[HP_TAG_KEY]   !== undefined ||
      i.metadata?.[COND_TAG_KEY] !== undefined
    );
    if (allOldTags.length > 0) await OBR.scene.items.deleteItems(allOldTags.map(t=>t.id));

    // Step 2: build all new tags
    const newTags = [];
    const boxW = 300;
    const iconSize = grid * 0.45; // condition icon size
    const iconRadius = grid * 0.72; // distance from token center

    for (const army of armies) {
      if (!army.tokenId) continue;
      const token = items.find(i=>i.id===army.tokenId);
      if (!token) continue;

      const isActive  = activeTurn?.id === army.id;
      const nameColor = isActive ? '#00FF88' : army.friendly ? '#7EC8E3' : '#F09595';
      const hpPct     = army.maxHp > 0 ? army.hp / army.maxHp : 1;
      const hpColor   = hpPct > 0.5 ? '#66DD66' : hpPct > 0.25 ? '#EF9F27' : '#E24B4A';

      // Name tag — above token
      newTags.push(buildText()
        .name(`kw-name-${army.tokenId}`)
        .plainText(army.name)
        .position({ x: token.position.x - boxW / 2, y: token.position.y - grid * 0.9 })
        .layer('TEXT').locked(true).visible(true).textType('PLAIN')
        .width(boxW)
        .fontSize(22).fontWeight(700).textAlign('CENTER')
        .fillColor(nameColor).strokeColor('#111110').strokeWidth(4)
        .attachedTo(army.tokenId)
        .metadata({ [NAME_TAG_KEY]: army.tokenId })
        .build()
      );

      // HP tag — below token
      newTags.push(buildText()
        .name(`kw-hp-${army.tokenId}`)
        .plainText(`${army.hp} / ${army.maxHp}`)
        .position({ x: token.position.x - boxW / 2, y: token.position.y + grid * 0.65 })
        .layer('TEXT').locked(true).visible(true).textType('PLAIN')
        .width(boxW)
        .fontSize(26).fontWeight(700).textAlign('CENTER')
        .fillColor(hpColor).strokeColor('#111110').strokeWidth(4)
        .attachedTo(army.tokenId)
        .metadata({ [HP_TAG_KEY]: army.tokenId })
        .build()
      );

      // Condition icons — half circle on the right side of token
      try {
        const c = army.conditions || {};
        const activeCondKeys = Object.keys(COND_ICONS).filter(k => c[k]);
        if (activeCondKeys.length > 0) {
          const totalIcons = activeCondKeys.length;
          const angleRange = Math.min(160, (totalIcons - 1) * 40);
          const startAngle = -angleRange / 2;
          const iconScale = iconSize / grid;

          activeCondKeys.forEach((condKey, idx) => {
            const angleDeg = totalIcons === 1
              ? 0
              : startAngle + (angleRange / (totalIcons - 1)) * idx;
            const angleRad = (angleDeg * Math.PI) / 180;
            const iconX = token.position.x + Math.cos(angleRad) * iconRadius - iconSize / 2;
            const iconY = token.position.y + Math.sin(angleRad) * iconRadius - iconSize / 2;
            const iconName = COND_ICONS[condKey];
            const iconUrl = `${BASE_URL}/${iconName}.png`;

            newTags.push(buildImage(
              { url: iconUrl, width: 256, height: 256, mime: 'image/png' },
              { dpi: 256, offset: { x: 0, y: 0 } }
            )
              .name(`kw-cond-${army.tokenId}-${condKey}`)
              .position({ x: iconX, y: iconY })
              .scale({ x: iconScale, y: iconScale })
              .layer('ATTACHMENT')
              .locked(true).visible(true)
              .attachedTo(army.tokenId)
              .metadata({ [COND_TAG_KEY]: army.tokenId })
              .build()
            );
          });
        }
      } catch(iconErr) {
        console.warn('condition icon build failed', iconErr);
      }
    }

    // Step 3: add all new tags in one batch.
    // If the batch fails (e.g. an image item is rejected), retry with
    // only name/HP tags so those don\'t silently disappear.
    if (newTags.length > 0) {
      try {
        await OBR.scene.items.addItems(newTags);
      } catch(addErr) {
        console.warn('addItems batch failed, retrying without condition icons', addErr);
        const safeTags = newTags.filter(t => t.type !== 'IMAGE');
        if (safeTags.length > 0) {
          try { await OBR.scene.items.addItems(safeTags); } catch(e2) { console.warn('fallback addItems also failed', e2); }
        }
      }
    }

  } catch(e) { console.warn('updateNameTags', e); }
}
async function removeNameTag(tokenId) {
  try {
    const items = await OBR.scene.items.getItems();
    const tags = items.filter(i=>
      i.metadata?.[NAME_TAG_KEY]===tokenId ||
      i.metadata?.[HP_TAG_KEY]===tokenId ||
      i.metadata?.[COND_TAG_KEY]===tokenId
    );
    if (tags.length) await OBR.scene.items.deleteItems(tags.map(t=>t.id));
  } catch(e) {}
}

// ── Delete fort token from scene ────────────────────────────────────
async function deleteFortToken(fort) {
  if (!fort.tokenId) return;
  try {
    await OBR.scene.items.deleteItems([fort.tokenId]);
  } catch(e) { console.warn('deleteFortToken', e); }
}

// ── Sync from tokens ───────────────────────────────────────────────
async function syncArmiesFromTokens() {
  try {
    const items = await OBR.scene.items.getItems();
    const tokenArmies = items
      .filter(i => i.layer==='CHARACTER' && i.metadata[`${ID}/army`])
      .map(i => {
        const meta = i.metadata[`${ID}/army`];
        const existing = armies.find(a=>a.id===meta.id);
        return existing || {
          id:meta.id, name:i.name||'Army', friendly:meta.friendly||false, initiative:0,
          ac:meta.ac||16, man:meta.man||4, mor:meta.mor||10, sct:meta.sct||7,
          atk:meta.atk||9, rng:meta.rng||0, maxHp:meta.maxHp||4, rt:meta.rt||2,
          maxShots:meta.maxShots||0, shots:meta.shots||0, hp:meta.hp||meta.maxHp||4,
          conditions:meta.conditions||{}, gear:meta.gear||[], tokenId:i.id,
        };
      });
    const existingIds = armies.map(a=>a.id);
    for (const ta of tokenArmies) {
      if (!existingIds.includes(ta.id)) armies.push(ta);
      else {
        const ex = armies.find(a=>a.id===ta.id);
        if (ex && !ex.gear?.length && ta.gear?.length) ex.gear = ta.gear;
      }
    }
    const tokenIds = items.map(i=>i.id);
    armies = armies.filter(a => !a.tokenId || tokenIds.includes(a.tokenId));
    const propItems = items.filter(i => i.layer==='PROP' && i.metadata[`${ID}/fort`]);
    for (const pi of propItems) {
      const meta = pi.metadata[`${ID}/fort`];
      if (!fortifications.find(f=>f.id===meta.id)) {
        fortifications.push({ id:meta.id, name:pi.name||'Fortification', type:meta.type||'keep', ac:meta.ac||25, maxHp:meta.maxHp||5, hp:meta.hp||meta.maxHp||5, tokenId:pi.id });
      }
    }
    fortifications = fortifications.filter(f => !f.tokenId || tokenIds.includes(f.tokenId));
  } catch(e) { console.warn('syncArmies',e); }
}

// ── OBR.onReady ────────────────────────────────────────────────────
OBR.onReady(async () => {
  const role = await OBR.player.getRole();
  isGM = role==='GM';
  _myPlayerId = await OBR.player.getId();
  _myPlayerName = await OBR.player.getName();
  initDicePlusListeners();
  document.getElementById('scene-status').textContent = isGM?'GM':'Player';

  await loadData();
  await syncArmiesFromTokens();
  dataLoaded = true;
  render();
  updateNameTags();

  OBR.room.onMetadataChange((meta) => {
    const d = meta[`${ID}/data`];
    if (d) {
      armies=d.armies||[]; fortifications=d.fortifications||[];
      round=d.round||1; currentTurnIdx=d.currentTurnIdx||0;
      routQueue=d.routQueue||[]; targetingMode=d.targetingMode||null;
      terrain=d.terrain||'plain'; defenderSide=d.defenderSide||'friendly';
      render();
    }
  });

  window.addEventListener('message', async (event) => {
    if (event.data?.type === 'SAVE_ARMY') {
      const updated = event.data.army; const itemId = event.data.itemId;
      if (!updated) return;
      const idx = armies.findIndex(a=>a.id===updated.id);
      if (idx>=0) armies[idx]=updated; else armies.push(updated);
      if (itemId) {
        try { await OBR.scene.items.updateItems([itemId],(items)=>{ for(const i of items){ i.name=updated.name; i.metadata[`${ID}/army`]={id:updated.id,friendly:updated.friendly,ac:updated.ac,man:updated.man,mor:updated.mor,sct:updated.sct,atk:updated.atk,rng:updated.rng,maxHp:updated.maxHp,rt:updated.rt,maxShots:updated.maxShots,shots:updated.shots,hp:updated.hp,conditions:updated.conditions,gear:updated.gear};}}); } catch(e) {}
      }
      await saveData(); render(); updateNameTags();
      OBR.notification.show(`${updated.name} saved`, 'INFO');
    }
  });

  setInterval(async () => {
    try {
      const rawFort = localStorage.getItem('KW_SAVE_FORT');
      if (rawFort) {
        try {
          const fd = JSON.parse(rawFort);
          if (fd.ts && Date.now()-fd.ts<=5000) {
            localStorage.removeItem('KW_SAVE_FORT');
            const uf=fd.fort; const fItemId=fd.itemId;
            if (uf) {
              const fi=fortifications.findIndex(f=>f.id===uf.id);
              if (fi>=0) fortifications[fi]=uf; else fortifications.push(uf);
              if (fItemId) { try { await OBR.scene.items.updateItems([fItemId],(items)=>{ for(const i of items){i.name=uf.name;i.metadata[`${ID}/fort`]={id:uf.id,ac:uf.ac,maxHp:uf.maxHp,hp:uf.hp,type:uf.type};}}); } catch(e){} }
              await saveData(); render();
              OBR.notification.show(`${uf.name} saved`,'INFO');
            }
          } else { localStorage.removeItem('KW_SAVE_FORT'); }
        } catch(e){}
      }
      const raw = localStorage.getItem('KW_SAVE_ARMY');
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!data.ts||Date.now()-data.ts>5000) { localStorage.removeItem('KW_SAVE_ARMY'); return; }
      localStorage.removeItem('KW_SAVE_ARMY');
      const updated=data.army; const itemId=data.itemId;
      if (!updated) return;
      const idx=armies.findIndex(a=>a.id===updated.id);
      if (idx>=0) armies[idx]=updated; else armies.push(updated);
      if (itemId) { try { await OBR.scene.items.updateItems([itemId],(items)=>{ for(const i of items){i.name=updated.name;i.metadata[`${ID}/army`]={id:updated.id,friendly:updated.friendly,ac:updated.ac,man:updated.man,mor:updated.mor,sct:updated.sct,atk:updated.atk,rng:updated.rng,maxHp:updated.maxHp,rt:updated.rt,maxShots:updated.maxShots,shots:updated.shots,hp:updated.hp,conditions:updated.conditions,gear:updated.gear};}}); } catch(e){} }
      await saveData(); render(); updateNameTags();
      OBR.notification.show(`${updated.name} saved`,'INFO');
    } catch(e){}
  }, 500);

  OBR.scene.items.onChange(async () => { await syncArmiesFromTokens(); render(); });

  OBR.contextMenu.create({
    id:`${ID}/statcard`,
    icons:[{ icon:`${BASE_URL}/icon.svg`, label:'Army Stat Card', filter:{ every:[{ key:'layer', value:'CHARACTER', operator:'==' }] } }],
    async onClick(context) {
      const item=context.items[0]; if(!item) return;
      try { const m=await OBR.room.getMetadata(); const d=m[`${ID}/data`]; if(d){armies=d.armies||[];} } catch(e){}
      let army=armies.find(a=>a.tokenId===item.id);
      if (!army) {
        const meta=item.metadata[`${ID}/army`]||{};
        army={ id:meta.id||crypto.randomUUID(), name:item.name||'Army', friendly:meta.friendly||false, initiative:0, ac:meta.ac||16, man:meta.man||4, mor:meta.mor||10, sct:meta.sct||7, atk:meta.atk||9, rng:meta.rng||0, maxHp:meta.maxHp||4, rt:meta.rt||2, maxShots:meta.maxShots||0, shots:meta.shots||0, hp:meta.hp||meta.maxHp||4, conditions:meta.conditions||{}, gear:meta.gear||[], tokenId:item.id };
        armies.push(army); await saveData();
      }
      const roomMeta=await OBR.room.getMetadata(); const roomData=roomMeta[`${ID}/data`];
      if (roomData?.armies) { const ra=roomData.armies.find(a=>a.id===army.id); if(ra) army=ra; }
      const armyParam=encodeURIComponent(JSON.stringify(army));
      await OBR.popover.open({ id:`${ID}/popover`, url:`${BASE_URL}/statcard.html?armyId=${army.id}&itemId=${item.id}&data=${armyParam}`, height:480, width:300 });
    }
  });

  OBR.contextMenu.create({
    id:`${ID}/fortcard`,
    icons:[{ icon:`${BASE_URL}/icon.svg`, label:'Fortification Card', filter:{ every:[{ key:'layer', value:'PROP', operator:'==' }] } }],
    async onClick(context) {
      const item=context.items[0]; if(!item) return;
      try { const m=await OBR.room.getMetadata(); const d=m[`${ID}/data`]; if(d){fortifications=d.fortifications||[];} } catch(e){}
      let fort=fortifications.find(f=>f.tokenId===item.id);
      if (!fort) { fort={ id:crypto.randomUUID(), name:item.name||'Fortification', type:'keep', ac:25, maxHp:5, hp:5, tokenId:item.id }; fortifications.push(fort); await saveData(); }
      const fortParam=encodeURIComponent(JSON.stringify(fort));
      await OBR.popover.open({ id:`${ID}/fortpopover`, url:`${BASE_URL}/fortcard.html?fortId=${fort.id}&itemId=${item.id}&data=${fortParam}`, height:360, width:280 });
    }
  });
}); // end OBR.onReady

// ── Tabs ───────────────────────────────────────────────────────────
window.showTab = function(tab) {
  activeTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['battle','armies','forts','log'][i]===tab));
  render();
};

function render() {
  const c=document.getElementById('content'); if(!c) return;
  if      (activeTab==='battle') c.innerHTML=renderBattle();
  else if (activeTab==='armies') c.innerHTML=renderArmies();
  else if (activeTab==='forts')  c.innerHTML=renderForts();
  else if (activeTab==='log')    { c.innerHTML='<button id="chat-clear-btn" onclick="clearChatLog()">Clear Log</button><div id="chat-log"></div>'; renderChatLog(); }
}

// ── Battle ─────────────────────────────────────────────────────────
function renderBattle() {
  const sorted=[...armies].sort((a,b)=>(b.initiative||0)-(a.initiative||0));
  const activeTurn=sorted[currentTurnIdx]||null;
  let html='';

  if (targetingMode) {
    const atk=armies.find(a=>a.id===targetingMode.armyId);
    const rtLabel=targetingMode.rollType
      .replace('attack0','Strike').replace('attack1','Strike 2').replace('attack2','Strike 3')
      .replace('ranged0','Ranged').replace('ranged1','Ranged 2').replace('ranged2','Ranged 3')
      .replace('maneuver','Maneuver').replace('morale','Morale');
    html+=`<div class="rout-prompt" style="border-color:#EF9F27;background:#2a2200">
      <h3 style="color:#EF9F27">🎯 ${atk?.name||''} — ${rtLabel}</h3>`;
    for (const t of armies.filter(a=>a.id!==targetingMode.armyId)) {
      html+=`<div class="rout-army"><span class="rout-army-name">${t.name} (${t.hp}/${t.maxHp} HP)</span><button class="rout-btn holds" onclick="executeRoll('${targetingMode.armyId}','${t.id}','${targetingMode.rollType}')">Target</button></div>`;
    }
    if ((targetingMode.rollType.startsWith('ranged')||targetingMode.rollType.startsWith('attack')) && fortifications.filter(f=>f.hp>0).length>0) {
      html+=`<div style="font-size:10px;color:#9F8FEF;margin:6px 0 3px;letter-spacing:1px">FORTIFICATIONS</div>`;
      for (const f of fortifications.filter(f=>f.hp>0)) {
        html+=`<div class="rout-army"><span class="rout-army-name" style="color:#9F8FEF">🏰 ${f.name} (HP ${f.hp}/${f.maxHp} · AC ${f.ac})</span><button class="rout-btn" style="background:#1a1535;color:#9F8FEF;border:1px solid #7F77DD" onclick="attackFort('${targetingMode.armyId}','${f.id}','${targetingMode.rollType}')">Siege</button></div>`;
      }
    }
    html+=`<button class="btn-secondary" style="margin-top:6px;width:100%" onclick="cancelTargeting()">Cancel</button></div>`;
  }

  if (routQueue.length>0&&isGM) {
    html+=`<div class="rout-prompt"><h3>⚠ Rout Checks</h3>`;
    for (const rid of routQueue) {
      const ra=armies.find(a=>a.id===rid); if(!ra) continue;
      html+=`<div class="rout-army"><span class="rout-army-name">${ra.name}</span><div class="rout-btns"><button class="rout-btn holds" onclick="resolveRout('${rid}','holds')">Holds</button><button class="rout-btn routes" onclick="resolveRout('${rid}','routes')">Routes</button></div></div>`;
    }
    html+=`</div>`;
  }

  html+=`<div class="round-bar"><span class="round-label">Round</span><button class="btn-round" onclick="changeRound(-1)">−</button><span class="round-num">${round}</span><button class="btn-round" onclick="changeRound(1)">+</button><button class="btn-next-turn" onclick="nextTurn()">Next ▶</button><button class="btn-end-round" onclick="endRound()">End Round</button></div>`;
  html+=`<button class="btn-secondary" style="margin-bottom:8px;width:100%" onclick="rollAllInitiative()">🎲 Roll All Initiative</button>`;

  const tInfo=TERRAINS[terrain]||TERRAINS.plain;
  html+=`<div style="background:#1a1a18;border-radius:6px;padding:8px 10px;margin-bottom:8px;border:0.5px solid #333">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <label style="font-size:10px;color:#666;letter-spacing:1px">TERRAIN</label>
      ${isGM?`<select style="flex:1;padding:3px 6px;background:#111;border:1px solid #333;border-radius:3px;color:#D3D1C7;font-size:12px" onchange="setTerrain(this.value)">${Object.entries(TERRAINS).map(([k,v])=>`<option value="${k}" ${terrain===k?'selected':''}>${v.label}</option>`).join('')}</select>`:`<span style="font-size:12px;color:#D3D1C7">${tInfo.label}</span>`}
      ${isGM?`<select style="padding:3px 6px;background:#111;border:1px solid #333;border-radius:3px;color:#D3D1C7;font-size:11px" onchange="setDefender(this.value)"><option value="friendly" ${defenderSide==='friendly'?'selected':''}>Allied defends</option><option value="enemy" ${defenderSide==='enemy'?'selected':''}>Enemy defends</option></select>`:''}
    </div>
    <div style="font-size:10px;color:#666">${tInfo.desc}</div>
  </div>`;

  if (sorted.length===0) { html+=`<div class="empty">No armies yet. Place tokens on the board and right-click them to set up army stat cards.</div>`; return html; }

  html+=`<div class="initiative-list">`;
  for (let i=0;i<sorted.length;i++) {
    const a=sorted[i];
    const isActive=activeTurn?.id===a.id;
    const hpPct=a.maxHp>0?(a.hp/a.maxHp)*100:0;
    const hpClass=hpPct>50?'':hpPct>25?'bloodied':'critical';
    const side=a.friendly?'friendly':'enemy';
    const c=a.conditions||{};
    let condHtml='';
    for (const cond of CONDITIONS) {
      if (c[cond.key]) { const val=cond.hasValue&&c[cond.key]>0?` ${c[cond.key]}`:''; condHtml+=`<span class="cond-badge cond-${cond.key}">${cond.label}${val}</span>`; }
    }
    // All players see name, HP, and initiative for all armies
    html+=`<div class="init-row ${side} ${isActive?'active-turn':''} ${c.routed?'routed':''} ${a.hp<=0?'defeated':''}"><div class="init-header"><span class="init-name">${isActive?'▶ ':''}${a.name}</span><span class="init-hp ${hpClass}">${a.hp}/${a.maxHp} HP</span><span class="init-value">${a.initiative||'—'}</span></div>${condHtml?`<div class="init-conditions">${condHtml}</div>`:''}</div>`;
  }
  html+=`</div>`;

  if (activeTurn&&(isGM||activeTurn.friendly)) {
    const s=getModifiedStats(activeTurn);
    const dis=targetingMode?'disabled':'';
    const aw=(rt)=>targetingMode?.armyId===activeTurn.id&&targetingMode?.rollType===rt?'awaiting-target':'';
    const hasRanged=activeTurn.rng>0||activeTurn.maxShots>0;
    html+=`<div class="army-card" style="margin-top:8px">
      <div class="army-card-header ${activeTurn.friendly?'friendly':'enemy'}">
        <span class="army-title">${activeTurn.name}</span>
        <span style="font-size:10px;color:#666">${activeTurn.hp}/${activeTurn.maxHp} HP</span>
      </div>
      <div class="army-card-body">
        <div class="rolls-section"><div class="rolls-label">ROLLS</div><div class="roll-btns">
          ${activeTurn.atk>0||s.atk>0?`
            <button class="roll-btn ${aw('attack0')}" ${dis} onclick="startRoll('${activeTurn.id}','attack0')">Strike (+${s.atk})</button>
            <button class="roll-btn ${aw('attack1')}" ${dis} onclick="startRoll('${activeTurn.id}','attack1')" style="opacity:0.8">Strike 2 (+${s.atk-5})</button>
            <button class="roll-btn ${aw('attack2')}" ${dis} onclick="startRoll('${activeTurn.id}','attack2')" style="opacity:0.6">Strike 3 (+${s.atk-10})</button>
          `:''}
          ${hasRanged?`
            <button class="roll-btn ${aw('ranged0')}" ${dis} onclick="startRoll('${activeTurn.id}','ranged0')">Ranged (+${s.rng})${activeTurn.maxShots>0?` [${activeTurn.shots||0}/${activeTurn.maxShots}]`:''}</button>
            <button class="roll-btn ${aw('ranged1')}" ${dis} onclick="startRoll('${activeTurn.id}','ranged1')" style="opacity:0.8">Ranged 2 (+${s.rng-5})${activeTurn.maxShots>0?` [${activeTurn.shots||0}/${activeTurn.maxShots}]`:''}</button>
            <button class="roll-btn ${aw('ranged2')}" ${dis} onclick="startRoll('${activeTurn.id}','ranged2')" style="opacity:0.6">Ranged 3 (+${s.rng-10})${activeTurn.maxShots>0?` [${activeTurn.shots||0}/${activeTurn.maxShots}]`:''}</button>
          `:''}
          <button class="roll-btn ${aw('maneuver')}" ${dis} onclick="startRoll('${activeTurn.id}','maneuver')">Maneuver (+${s.man})</button>
          <button class="roll-btn ${aw('morale')}"   ${dis} onclick="startRoll('${activeTurn.id}','morale')">Morale (+${s.mor})</button>
          <button class="roll-btn" onclick="rollScout('${activeTurn.id}')">Scout (+${activeTurn.sct})</button>
        </div></div>
        ${(()=>{ const potions=(activeTurn.gear?.potions||0); return potions>0?`
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px;background:#1a1a18;border-radius:5px;padding:5px 8px;border:1px solid #2d3d1a">
          <span style="font-size:18px">🧪</span>
          <span style="font-size:12px;color:#5DCAA5;flex:1">Healing Potions</span>
          <span style="font-size:13px;font-weight:700;color:#5DCAA5">${potions}</span>
          <span style="font-size:10px;color:#666">remaining</span>
          <button class="rout-btn holds" style="padding:3px 10px;background:#1a2d1a;border-color:#5DCAA5;color:#5DCAA5" onclick="usePotion('${activeTurn.id}')">Use (Heal 1)</button>
        </div>
        `:''; })()}
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
          <label style="font-size:10px;color:#666">HP</label>
          <button class="hp-btn" onclick="changeHp('${activeTurn.id}',-1)">−</button>
          <span style="font-size:14px;font-weight:500;min-width:20px;text-align:center">${activeTurn.hp}</span>
          <button class="hp-btn" onclick="changeHp('${activeTurn.id}',1)">+</button>
          <label style="font-size:10px;color:#666;margin-left:8px">Initiative</label>
          <input type="number" value="${activeTurn.initiative||0}" style="width:54px;padding:3px 6px;background:#111;border:1px solid #333;border-radius:3px;color:#D3D1C7;font-size:12px" onchange="setInitiative('${activeTurn.id}',this.value)"/>
          <button class="rout-btn holds" style="padding:3px 8px" onclick="rollInitiative('${activeTurn.id}')">Roll</button>
        </div>
      </div>
    </div>`;
  }
  return html;
}

// ── Armies ─────────────────────────────────────────────────────────
function renderArmies() {
  if (armies.length===0) return `<div class="empty">No armies yet. Place tokens on the board and right-click them.</div>`;
  let html='';
  for (const a of armies) {
    // Players see enemy name + HP only, no full stats
    if (!isGM && !a.friendly) {
      const hpPct=a.maxHp>0?(a.hp/a.maxHp)*100:0;
      const hpColor=hpPct>50?'#E24B4A':hpPct>25?'#EF9F27':'#8B0000';
      html+=`<div class="army-card"><div class="army-card-header enemy">
        <span class="army-title">${a.name}</span>
        <span style="font-size:11px;color:#E24B4A">${a.hp}/${a.maxHp} HP</span>
      </div>
      <div class="army-card-body" style="padding:6px 10px">
        <div class="hp-bar-wrap"><div class="hp-bar" style="width:${hpPct}%;background:${hpColor}"></div></div>
      </div></div>`;
      continue;
    }
    const s=getModifiedStats(a); const c=a.conditions||{};
    const hpPct=a.maxHp>0?(a.hp/a.maxHp)*100:0;
    const hpColor=hpPct>50?'#378ADD':hpPct>25?'#EF9F27':'#E24B4A';
    const side=a.friendly?'friendly':'enemy';
    let condBtns='';
    for (const cond of CONDITIONS) {
      const active=c[cond.key]?'active':'';
      const val=cond.hasValue&&c[cond.key]>0?`<span class="cond-value">${c[cond.key]}</span>`:'';
      condBtns+=`<button class="cond-btn ${active} ${cond.key}" onclick="toggleCondition('${a.id}','${cond.key}')">${cond.label}${val}</button>`;
    }
    html+=`<div class="army-card">
      <div class="army-card-header ${side}">
        <span class="army-title">${a.name}</span>
        <span style="font-size:10px;color:#666">${a.friendly?'Friendly':'Enemy'}</span>
        ${isGM?`<button style="font-size:10px;padding:2px 6px;background:#333;border:1px solid #555;border-radius:3px;color:#888;cursor:pointer" onclick="deleteArmy('${a.id}')">✕</button>`:''}
      </div>
      <div class="army-card-body">
        <div class="stats-row">
          <div class="stat-box"><div class="stat-label">AC</div><div class="stat-value ${s.ac!==a.ac?'modified':''}">${s.ac}</div></div>
          <div class="stat-box"><div class="stat-label">MAN</div><div class="stat-value ${s.man!==a.man?'modified':''}">+${s.man}</div></div>
          <div class="stat-box"><div class="stat-label">MOR</div><div class="stat-value ${s.mor!==a.mor?'modified':''}">+${s.mor}</div></div>
          <div class="stat-box"><div class="stat-label">SCT</div><div class="stat-value">+${a.sct}</div></div>
        </div>
        <div class="hp-row" style="margin-bottom:8px">
          <span class="hp-label">HP</span>
          <div class="hp-controls">
            <button class="hp-btn" onclick="changeHp('${a.id}',-1)">−</button>
            <span class="hp-display">${a.hp}</span>
            <span class="hp-max">/ ${a.maxHp} (RT ${a.rt})</span>
            <button class="hp-btn" onclick="changeHp('${a.id}',1)">+</button>
          </div>
          <div class="hp-bar-wrap"><div class="hp-bar" style="width:${hpPct}%;background:${hpColor}"></div></div>
        </div>
        <div class="conds-section"><div class="conds-label">CONDITIONS</div><div class="conds-grid">${condBtns}</div></div>
      </div>
    </div>`;
  }
  return html;
}

// ── Forts ──────────────────────────────────────────────────────────
function renderForts() {
  if (fortifications.length===0) return `<div class="empty">No fortifications.<br>Place a fortification prop on the board and right-click it to set it up.</div>`;
  let html='';
  for (const f of fortifications) {
    const hpPct=f.maxHp>0?(f.hp/f.maxHp)*100:0;
    const hpColor=hpPct>50?'#7F77DD':hpPct>25?'#EF9F27':'#E24B4A';
    const damaged=f.hp<=Math.floor(f.maxHp/2)&&f.hp>0;
    const destroyed=f.hp===0;
    html+=`<div class="army-card" style="border-left:2px solid #7F77DD">
      <div class="army-card-header" style="border-top:2px solid #7F77DD;background:#1a1535">
        <span class="army-title">🏰 ${f.name}</span>
        <span style="font-size:10px;color:#9F8FEF">${FORT_TYPES[f.type]?.label||f.type}</span>
        ${damaged?`<span style="font-size:10px;color:#EF9F27;margin-left:4px">⚠ Damaged</span>`:''}
        ${destroyed?`<span style="font-size:10px;color:#E24B4A;margin-left:4px">✕ Destroyed</span>`:''}
        ${isGM?`<button style="font-size:10px;padding:2px 6px;background:#333;border:1px solid #555;border-radius:3px;color:#888;cursor:pointer;margin-left:auto" onclick="deleteFort('${f.id}')">✕</button>`:''}
      </div>
      <div class="army-card-body">
        <div class="stats-row">
          <div class="stat-box"><div class="stat-label">AC</div><div class="stat-value">${f.ac}</div></div>
          <div class="stat-box"><div class="stat-label">HP</div><div class="stat-value">${f.hp}/${f.maxHp}</div></div>
        </div>
        <div class="hp-row" style="margin-top:4px">
          <span class="hp-label">HP</span>
          <div class="hp-controls">
            ${isGM?`<button class="hp-btn" onclick="changeFortHp('${f.id}',-1)">−</button>`:''}
            <span class="hp-display">${f.hp}</span>
            <span class="hp-max">/ ${f.maxHp}</span>
            ${isGM?`<button class="hp-btn" onclick="changeFortHp('${f.id}',1)">+</button>`:''}
          </div>
          <div class="hp-bar-wrap"><div class="hp-bar" style="width:${hpPct}%;background:${hpColor}"></div></div>
        </div>
      </div>
    </div>`;
  }
  return html;
}

// ── Handlers ───────────────────────────────────────────────────────
window.changeRound    = async (d)    => { round=Math.max(1,round+d); await saveData(); render(); };
window.nextTurn       = async ()     => { const s=[...armies].sort((a,b)=>(b.initiative||0)-(a.initiative||0)); if(!s.length) return; currentTurnIdx=(currentTurnIdx+1)%s.length; await saveData(); render(); };
window.endRound       = async ()     => { routQueue=armies.filter(a=>a.hp>0&&a.hp<=a.rt&&!a.conditions?.routed).map(a=>a.id); round++; currentTurnIdx=0; await saveData(); render(); };
window.resolveRout    = async (id,r) => { routQueue=routQueue.filter(x=>x!==id); if(r==='routes'){const a=armies.find(x=>x.id===id);if(a){a.conditions=a.conditions||{};a.conditions.routed=true;a.conditions.shaken=Math.min(4,(a.conditions.shaken||0)+1);}} await saveData(); render(); };
window.rollAllInitiative = async () => { for(const a of armies) a.initiative=Math.floor(Math.random()*20)+1+a.sct; currentTurnIdx=0; await saveData(); render(); };
window.rollInitiative = async (id)   => { const a=armies.find(x=>x.id===id); if(a){a.initiative=Math.floor(Math.random()*20)+1+a.sct; await saveData(); render();} };
window.setInitiative  = async (id,v) => { const a=armies.find(x=>x.id===id); if(a){a.initiative=parseFloat(v)||0; await saveData();} };
window.changeHp       = async (id,d) => { const a=armies.find(x=>x.id===id); if(!a) return; a.hp=Math.max(0,Math.min(a.maxHp,a.hp+d)); if(a.hp===0) OBR.notification.show(`${a.name} is Defeated!`,'WARNING'); await saveData(); render(); };
window.usePotion      = async (id) => {
  const a=armies.find(x=>x.id===id); if(!a) return;
  const potions=a.gear?.potions||0; if(potions<=0) return;
  a.gear.potions=potions-1;
  a.hp=Math.min(a.maxHp,a.hp+1);
  OBR.notification.show(`${a.name} uses a Healing Potion — healed to ${a.hp}/${a.maxHp} HP`,'INFO');
  await saveData(); render();
};
window.toggleCondition= async (id,k) => {
  const a=armies.find(x=>x.id===id); if(!a) return;
  a.conditions=a.conditions||{}; const cond=CONDITIONS.find(c=>c.key===k);
  if(cond?.hasValue){a.conditions[k]=((a.conditions[k]||0)+1)%(cond.max+1);if(!a.conditions[k])delete a.conditions[k];}
  else{if(a.conditions[k])delete a.conditions[k];else a.conditions[k]=true;}
  if(k==='shaken'&&(a.conditions.shaken||0)>=4){a.conditions.routed=true;OBR.notification.show(`${a.name} is Routed!`,'WARNING');}
  if(k==='pinned'&&a.conditions.pinned)a.conditions.outflanked=true;
  await saveData(); render();
};
window.startRoll      = async (id,rt) => { if(targetingMode?.armyId===id&&targetingMode?.rollType===rt){targetingMode=null;await saveData();render();return;} targetingMode={armyId:id,rollType:rt}; await saveData(); render(); };
window.executeRoll    = async (atkId,tgtId,rt) => { targetingMode=null; await resolveRoll(atkId,tgtId,rt); };
window.cancelTargeting= async ()     => { targetingMode=null; await saveData(); render(); };
window.setTerrain     = async (t)    => {
  terrain=t;
  if(t==='swamp'){for(const a of armies){a.conditions=a.conditions||{};if(a.type==='Cavalry')a.conditions.mired=Math.max(a.conditions.mired||0,2);else a.conditions.mired=Math.max(a.conditions.mired||0,1);}OBR.notification.show('Swamp: all armies Mired 1 (Cavalry Mired 2)','WARNING');}
  await saveData(); render();
};
window.setDefender    = async (s)    => { defenderSide=s; await saveData(); render(); };

window.rollScout = async (armyId) => {
  const a=armies.find(x=>x.id===armyId); if(!a) return;
  const roll = await rollWithDicePlus(20);
  const total = roll + a.sct;
  showResult(`Scout: ${total}`, null, `d20(${roll}) + ${a.sct}`);
  addChatEntry({ who: a.name, rollType: 'Scout', total: `${total}`, degree: null, detail: `d20(${roll}) + ${a.sct}`, outcome: '' });
};

window.deleteArmy = async (id) => {
  const a=armies.find(x=>x.id===id); if(a?.tokenId) removeNameTag(a.tokenId);
  armies=armies.filter(x=>x.id!==id);
  for(const f of fortifications) f.garrisonedArmies=(f.garrisonedArmies||[]).filter(x=>x!==id);
  await saveData(); render();
};
window.deleteFort = async (id) => {
  const f=fortifications.find(x=>x.id===id);
  if(f) await deleteFortToken(f);
  fortifications=fortifications.filter(x=>x.id!==id);
  await saveData(); render();
};
window.changeFortHp = async (id, delta) => {
  const f=fortifications.find(x=>x.id===id); if(!f) return;
  f.hp=Math.max(0,Math.min(f.maxHp,f.hp+delta));
  if(f.hp===0) {
    OBR.notification.show(`${f.name} destroyed!`,'ERROR');
    await deleteFortToken(f);
    fortifications=fortifications.filter(x=>x.id!==id);
  }
  await saveData(); render();
};

window.attackFort = async (attackerId, fortId, rollType) => {
  const atk=armies.find(a=>a.id===attackerId);
  const fort=fortifications.find(f=>f.id===fortId);
  if(!atk||!fort) return;
  const as=getModifiedStats(atk);
  const isRanged=rollType.startsWith('ranged');
  const mapNum=parseInt(rollType.slice(-1))||0;
  const map=mapNum===0?0:mapNum===1?-5:-10;
  if(isRanged&&(atk.shots||0)<=0){showResult('No shots remaining!',null);return;}
  if(isRanged) atk.shots=Math.max(0,(atk.shots||0)-1);
  const modifier=(isRanged?as.rng:as.atk)+map;

  const roll = await rollWithDicePlus(20);
  const total=roll+modifier;
  const degree=getDegree(roll,total,fort.ac);
  let outcome='';
  if(degree==='crit-success'){fort.hp=Math.max(0,fort.hp-2);outcome=`Crit Hit! ${fort.name} −2 HP (${fort.hp}/${fort.maxHp})`;}
  else if(degree==='success'){fort.hp=Math.max(0,fort.hp-1);outcome=`Hit! ${fort.name} −1 HP (${fort.hp}/${fort.maxHp})`;}
  else if(degree==='failure') outcome='Miss.';
  else outcome='Critical Miss!';
  if(fort.hp===0){
    outcome+=` · ${fort.name} DESTROYED`;
    OBR.notification.show(`${fort.name} destroyed!`,'ERROR');
    await deleteFortToken(fort);
    fortifications=fortifications.filter(f=>f.id!==fort.id);
  } else if(fort.hp<=Math.floor(fort.maxHp/2)) outcome+=` · ⚠ Damaged`;
  showResult(`${total}`,degree,`d20(${roll}) +${modifier} vs Fort AC ${fort.ac}`,outcome);
  OBR.notification.show(`${atk.name} attacks ${fort.name}: ${total} — ${outcome}`,['crit-success','success'].includes(degree)?'INFO':'WARNING');
  addChatEntry({ who: atk.name, rollType: `Siege → ${fort.name}`, total, degree, detail: `d20(${roll}) +${modifier} vs Fort AC ${fort.ac}`, outcome });
  targetingMode=null; await saveData(); render();
};

// ── Roll resolution ────────────────────────────────────────────────
async function resolveRoll(attackerId, targetId, rollType) {
  const atk=armies.find(a=>a.id===attackerId); const tgt=armies.find(a=>a.id===targetId);
  if(!atk||!tgt) return;
  const as=getModifiedStats(atk); const ts=getModifiedStats(tgt);
  let modifier, dc, label, detail;

  if(rollType.startsWith('attack')||rollType.startsWith('ranged')) {
    const isRanged=rollType.startsWith('ranged');
    const mapNum=parseInt(rollType.slice(-1))||0;
    const map=mapNum===0?0:mapNum===1?-5:-10;
    const terrainMod=getTerrainMods(atk,rollType);
    const terrainAcMod=isRanged?getTerrainAcMod(tgt):0;
    modifier=(isRanged?as.rng:as.atk)+map+terrainMod; dc=ts.ac+terrainAcMod;
    label=isRanged?'Ranged':'Attack';
    const modParts=[map!==0?`MAP ${map}`:'',terrainMod!==0?`terrain ${terrainMod>0?'+':''}${terrainMod}`:'',terrainAcMod!==0?`tgt AC +${terrainAcMod}`:''].filter(Boolean).join(', ');
    detail=`vs AC ${dc}${modParts?` (${modParts})`:''}`; 
    if(isRanged){if((atk.shots||0)<=0){showResult('No shots remaining!',null);return;}atk.shots=Math.max(0,(atk.shots||0)-1);}
  } else if(rollType==='maneuver') {
    const tm=getTerrainMods(atk,'maneuver'); modifier=as.man+tm; dc=ts.manDC; label='Maneuver'; detail=`vs MAN DC ${dc}${tm!==0?` (terrain ${tm>0?'+':''}${tm})`:''}`;
  } else if(rollType==='morale') {
    const tm=getTerrainMods(atk,'morale'); modifier=as.mor+tm; dc=ts.morDC; label='Morale'; detail=`vs MOR DC ${dc}${tm!==0?` (terrain ${tm>0?'+':''}${tm})`:''}`;
  }

  // Roll via Dice+ (falls back to Math.random if not installed)
  const roll = await rollWithDicePlus(20);
  const total=roll+modifier; const degree=getDegree(roll,total,dc); let outcome='';
  if(rollType.startsWith('attack')||rollType.startsWith('ranged')) {
    if(degree==='crit-success'){tgt.hp=Math.max(0,tgt.hp-2);outcome=`Crit Hit! ${tgt.name} −2 HP (${tgt.hp}/${tgt.maxHp})`;tgt.conditions=tgt.conditions||{};if(Math.floor(Math.random()*20)+1<=10){tgt.conditions.shaken=Math.min(4,(tgt.conditions.shaken||0)+1);outcome+=` · Shaken ${tgt.conditions.shaken}`;}}
    else if(degree==='success'){tgt.hp=Math.max(0,tgt.hp-1);outcome=`Hit! ${tgt.name} −1 HP (${tgt.hp}/${tgt.maxHp})`;}
    else if(degree==='failure') outcome='Miss.';
    else outcome='Critical Miss!';
    if(tgt.hp===0) outcome+=` · ${tgt.name} DEFEATED`;
  } else if(rollType==='maneuver') {
    if(degree==='crit-success') outcome='Crit Success';
    else if(degree==='success') outcome='Success';
    else if(degree==='failure') outcome='Failure';
    else{outcome='Crit Fail — Mired 1';atk.conditions=atk.conditions||{};atk.conditions.mired=Math.min(4,(atk.conditions.mired||0)+1);}
  } else if(rollType==='morale') {
    if(degree==='crit-success') outcome='Crit Success';
    else if(degree==='success') outcome='Success';
    else if(degree==='failure'){outcome='Failure — Shaken +1';tgt.conditions=tgt.conditions||{};tgt.conditions.shaken=Math.min(4,(tgt.conditions.shaken||0)+1);}
    else{outcome='Crit Fail — Shaken +2';tgt.conditions=tgt.conditions||{};tgt.conditions.shaken=Math.min(4,(tgt.conditions.shaken||0)+2);}
    if((tgt.conditions?.shaken||0)>=4){tgt.conditions.routed=true;outcome+=' · ROUTED';}
  }
  showResult(`${total}`,degree,`d20(${roll}) +${modifier} ${detail}`,outcome);
  OBR.notification.show(`${atk.name} ${label}: ${total} — ${outcome}`,['crit-success','success'].includes(degree)?'INFO':'WARNING');
  addChatEntry({ who: atk.name, rollType: `${label} → ${tgt.name}`, total, degree, detail: `d20(${roll}) +${modifier} ${detail}`, outcome });
  await saveData(); render();
}

function getDegree(roll,total,dc) {
  let d;
  if(total>=dc+10) d='crit-success'; else if(total>=dc) d='success';
  else if(total<=dc-10) d='crit-fail'; else d='failure';
  // Nat 20: raise degree by one step
  if(roll===20) {
    if(d==='crit-fail') d='failure';
    else if(d==='failure') d='success';
    else if(d==='success') d='crit-success';
  }
  // Nat 1: lower degree by one step
  if(roll===1) {
    if(d==='crit-success') d='success';
    else if(d==='success') d='failure';
    else if(d==='failure') d='crit-fail';
  }
  return d;
}

// ── Chat log ───────────────────────────────────────────────────────
let chatEntries = [];
const MAX_LOG = 100;

function addChatEntry({ who, rollType, total, degree, detail, outcome }) {
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  chatEntries.unshift({ who, rollType, total, degree, detail, outcome, time });
  if (chatEntries.length > MAX_LOG) chatEntries.length = MAX_LOG;
  if (activeTab==='log') renderChatLog();
  const logBtn=document.getElementById('log-tab-btn');
  if(logBtn&&activeTab!=='log'){logBtn.style.color='#EF9F27';setTimeout(()=>{if(logBtn)logBtn.style.color='';},2000);}
}

function renderChatLog() {
  const log = document.getElementById('chat-log');
  if (!log) return;
  if (!chatEntries.length) { log.innerHTML = '<div class="chat-empty">No rolls yet.</div>'; return; }
  const dlabels = {'crit-success':'Critical Success','success':'Success','failure':'Failure','crit-fail':'Critical Failure'};
  log.innerHTML = chatEntries.map(e => {
    const cls = e.degree || 'info';
    return `<div class="chat-entry ${cls}">
      <div class="chat-header"><span class="chat-who">${e.who||''}</span><span class="chat-time">${e.time}</span></div>
      ${e.rollType ? `<div class="chat-roll-type">${e.rollType}</div>` : ''}
      <div class="chat-total ${cls}">${e.total}</div>
      ${e.degree ? `<div class="chat-degree ${cls}">${dlabels[e.degree]||''}</div>` : ''}
      ${e.detail  ? `<div class="chat-detail">${e.detail}</div>` : ''}
      ${e.outcome ? `<div class="chat-outcome">${e.outcome}</div>` : ''}
    </div>`;
  }).join('');
}

window.clearChatLog = function() { chatEntries = []; if(activeTab==='log') renderChatLog(); };

function showResult(title,degree,detail,outcome) {
  document.querySelector('.roll-result')?.remove(); clearTimeout(resultTimeout);
  const div=document.createElement('div'); div.className='roll-result';
  const labels={'crit-success':'Critical Success','success':'Success','failure':'Failure','crit-fail':'Critical Failure'};
  div.innerHTML=`<div class="result-title">${title}</div>${degree?`<div class="result-dice ${degree}">${labels[degree]||''}</div>`:''}${detail?`<div class="result-detail">${detail}</div>`:''}${outcome?`<div class="result-outcome">${outcome}</div>`:''}`;
  document.body.appendChild(div);
  resultTimeout=setTimeout(()=>div.remove(),6000);
}

</script>
